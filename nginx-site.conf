# ============================================================================
# 官网 + 系统 的域名分流 (v1.7.612)
#
#   主域名   guxiaocha.com / www  → 官网静态站 site/dist
#   子域名   app.guxiaocha.com    → 现有系统 frontend/dist
#   裸 IP 访问                     → 仍走 nginx-default.conf(系统), 备案前照旧可用
#
# ---------------------------------------------------------------------------
# 用之前必做三件事:
#   1. 把下面所有 guxiaocha.com 换成你真正买的域名(全文替换)
#   2. 域名解析: @ / www / app 三条 A 记录都指向 124.71.75.5
#   3. ICP 备案通过后再开 443 —— 未备案的域名在国内服务器上 80/443 会被阻断
#
# 启用:
#   scp 到服务器后
#   cp /opt/trading-monitor/nginx-site.conf /etc/nginx/conf.d/site.conf
#   nginx -t && systemctl reload nginx
#
# HTTPS(备案通过后):
#   certbot --nginx -d guxiaocha.com -d www.guxiaocha.com -d app.guxiaocha.com
#   certbot 会自动往下面两个 server 里插 443 与跳转, 不用手写。
# ============================================================================


# ---------- 官网(主域名) ----------
server {
    listen 80;
    server_name guxiaocha.com www.guxiaocha.com;

    root /opt/trading-monitor/site/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # 官网只需要内测申请这一个接口。反代到同一个 uvicorn, 所以表单是同源的, 不用管 CORS。
    # 精确匹配 /api/apply, 不整段开放 /api/ —— 官网域名下不该能摸到系统的其他接口。
    location = /api/apply {
        proxy_pass http://127.0.0.1:8888/api/apply;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}


# ---------- 系统(app 子域名) ----------
# 与 nginx-default.conf 内容一致, 只是绑到 app 子域名。
server {
    listen 80;
    server_name app.guxiaocha.com;

    root /opt/trading-monitor/frontend/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8888/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
