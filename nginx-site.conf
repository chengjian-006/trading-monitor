# Public HTTPS deployment. Replace guxiaocha.com (and every app subdomain
# below) with the registered production domain before enabling this file.
#
# Prerequisites:
#   1. Point the apex, www, and app A records at the server.
#   2. Obtain certificates, for example with:
#      certbot certonly --nginx -d guxiaocha.com -d www.guxiaocha.com -d app.guxiaocha.com
#   3. Copy this file to nginx's enabled configuration directory and run
#      nginx -t before reloading nginx.

# HTTP is only used to redirect named hosts to HTTPS. The default HTTP server
# rejects bare-IP and unknown-host requests in nginx-default.conf.
server {
    listen 80;
    server_name guxiaocha.com www.guxiaocha.com app.guxiaocha.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name guxiaocha.com www.guxiaocha.com;

    ssl_certificate /etc/letsencrypt/live/guxiaocha.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guxiaocha.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

    root /opt/trading-monitor/site/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    location /assets/ {
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # The public site exposes only the application form endpoint.
    location = /api/apply {
        proxy_pass http://127.0.0.1:8888/api/apply;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name app.guxiaocha.com;

    # The documented certbot command creates one SAN certificate for the
    # apex, www and app names, so both virtual hosts use this lineage.
    ssl_certificate /etc/letsencrypt/live/guxiaocha.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guxiaocha.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

    root /opt/trading-monitor/frontend/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    location /assets/ {
        expires 1y;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8888/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
