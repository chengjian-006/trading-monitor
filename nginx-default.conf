# Catch-all listener: do not serve the application from a bare IP address or
# an unrecognised Host header.  Named HTTPS virtual hosts live in
# nginx-site.conf.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# Reject a bare IP address or an unrecognised SNI name before any certificate
# or application response can be selected.
server {
    listen 443 ssl default_server;
    server_name _;
    ssl_reject_handshake on;
}
