<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>问财观点 · 完整设置</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    /* 覆盖 popup 的窄宽 body, 走宽屏文档流 */
    body { width: auto; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 28px 20px 48px; }
    .page-hd { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .page-hd .logo { width: 40px; height: 40px; border-radius: 11px; font-size: 20px; }
    .page-hd h1 { font-size: 19px; margin: 0; font-weight: 800; letter-spacing: .02em; }
    .page-hd .sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }
    .card { margin-bottom: 14px; padding: 16px 18px; }
    .card-title { font-size: 13px; margin-bottom: 12px; }
    .field textarea { min-height: 84px; }
    #presets { min-height: 128px; }
    .privacy-line {
      display: flex; align-items: center; gap: 7px; margin-top: 8px;
      font-size: 12px; color: var(--ink-3);
    }
    .save-hint { color: var(--ok); font-weight: 600; }

    /* ===== 定时自动问 · 时间点/问题选择器（与 popup.html 内联样式保持一致） ===== */
    .sched-quick { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .sched-quick label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 9px; border: 1px solid var(--line); border-radius: 8px;
      background: var(--card); font-size: 12px; cursor: pointer; user-select: none;
    }
    .sched-quick label.on { border-color: var(--brand-line); background: var(--brand-soft); color: var(--brand); font-weight: 700; }
    .sched-quick input { margin: 0; }
    .sched-quick .q-lbl { color: var(--ink-3); font-weight: 400; }
    .sched-quick label.on .q-lbl { color: var(--brand); }
    .sched-add { display: flex; gap: 6px; align-items: center; }
    .sched-add input[type=time] {
      flex: 1; min-width: 0; padding: 6px 8px; border: 1px solid var(--line);
      border-radius: 8px; background: var(--card); color: var(--ink);
      font-size: 12px; font-family: inherit;
    }
    .sched-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .sched-tags .ttag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 6px 3px 9px; border-radius: 999px;
      background: var(--brand-soft); border: 1px solid var(--brand-line);
      color: var(--brand); font-size: 12px; font-weight: 700;
    }
    .sched-tags .ttag button {
      border: 0; background: transparent; color: inherit; cursor: pointer;
      font-size: 13px; line-height: 1; padding: 0 2px; opacity: .6;
    }
    .sched-tags .ttag button:hover { opacity: 1; }
    .sched-tags .empty, .sched-qlist .empty { color: var(--ink-3); font-size: 12px; padding: 2px 0; }
    .sched-qlist { display: flex; flex-direction: column; gap: 5px; }
    .sched-qlist label {
      display: flex; align-items: flex-start; gap: 7px; padding: 6px 8px;
      border: 1px solid var(--line); border-radius: 8px; background: var(--card);
      font-size: 12px; line-height: 1.45; cursor: pointer;
    }
    .sched-qlist label.on { border-color: var(--brand-line); background: var(--brand-soft); }
    .sched-qlist input { margin: 2px 0 0; flex-shrink: 0; }
    .sched-qlist .orphan {
      display: flex; align-items: center; gap: 7px; padding: 6px 8px;
      border: 1px solid var(--warn); border-radius: 8px; background: var(--warn-soft);
      font-size: 12px; line-height: 1.45;
    }
    .sched-qlist .orphan .o-txt { flex: 1; color: var(--ink-2); }
    .sched-qlist .orphan .o-tip { display: block; color: var(--warn); font-size: 11px; margin-top: 2px; }
    .sched-qlist .orphan button {
      border: 0; background: transparent; color: var(--warn);
      cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px;
    }
    .sched-note { font-size: 11px; color: var(--warn); margin-top: 9px; line-height: 1.5; }
    .sched-lastrun {
      margin-top: 9px; padding: 7px 9px; border-radius: 8px;
      background: var(--line-soft); color: var(--ink-2); font-size: 12px;
    }
    .sched-lastrun.bad { background: var(--err-soft); color: var(--err); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="page-hd">
    <div class="logo">💡</div>
    <div>
      <h1>问财观点 · 完整设置</h1>
      <div class="sub">宽屏编辑预置问题、定时与存档规则 · 改完自动保存 <span id="saveHint" class="save-hint"></span></div>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">存进股小察</div>
      <div class="field">
        <label for="uploader">我的昵称</label>
        <input id="uploader" type="text" placeholder="选填，如：老王（留空自动用同花顺账号）">
      </div>
      <label class="sw-row">
        <span class="sw-txt">问完自动存档<small>关掉 = 只看答案，要存再手动点</small></span>
        <span class="sw-wrap"><input id="autoUpload" type="checkbox"><span class="sw"></span></span>
      </label>
      <label class="sw-row">
        <span class="sw-txt">没识别出个股就不存<small>过滤纯观点类回答</small></span>
        <span class="sw-wrap"><input id="onlyWithStock" type="checkbox"><span class="sw"></span></span>
      </label>
      <label class="sw-row">
        <span class="sw-txt">深度研究<small>更深入，但每天约10次额度；普通约188次</small></span>
        <span class="sw-wrap"><input id="deepResearch" type="checkbox"><span class="sw"></span></span>
      </label>
      <div class="privacy-line">🔒 用你自己的问财登录，数据只发往你的股小察服务器。</div>
    </div>

    <div class="card">
      <div class="card-title">定时自动问 <span style="font-weight:400;color:var(--warn)">⚠️ 自动化封号风险相对高，谨慎开</span></div>
      <label class="sw-row">
        <span class="sw-txt">开启定时自动问</span>
        <span class="sw-wrap"><input id="schedEnabled" type="checkbox"><span class="sw"></span></span>
      </label>
      <div id="schedBody" class="sched-body">
        <div class="field">
          <label>时间点</label>
          <!-- 常用时间点直接勾, 自定义走 input[type=time]: 原生就产出零填充 HH:MM,
               从根上避免手敲出 "9:35"/中文逗号这类后台永远匹配不上的值 -->
          <div id="schedQuick" class="sched-quick"></div>
          <div class="sched-add">
            <input id="schedCustomTime" type="time" step="60" aria-label="自定义时间点">
            <button id="schedAddTime" class="btn ghost" type="button">添加</button>
          </div>
          <div id="schedTimeTags" class="sched-tags"></div>
        </div>
        <div class="field">
          <label>定时跑哪些问题</label>
          <!-- 从预置问题里勾选, 不再让用户把问题重抄一遍(抄完两边就不同步了) -->
          <div id="schedQList" class="sched-qlist"></div>
          <div id="schedQHint" class="field-hint"></div>
        </div>
        <div class="sched-note">浏览器必须保持开着才会执行（关机/退出浏览器期间不会跑）。</div>
        <div id="schedLastRun" class="sched-lastrun">上次运行：还没跑过</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">预置问题</div>
    <div class="field">
      <textarea id="presets" placeholder="每行一条口语问题"></textarea>
      <div class="field-hint">显示在弹窗问答页和问财页 💡 悬浮菜单里，每行一条。</div>
    </div>
  </div>

  <div class="ver-row">
    <span class="ver-txt">版本 <b id="verNow"></b></span>
    <button id="checkUpdate" class="btn ghost">检查更新</button>
  </div>

  <div id="toast" class="toast"></div>
</div>
<script src="options.js"></script>
</body>
</html>
