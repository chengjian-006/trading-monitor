<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>问财观点</title>
  <style>
    :root {
      --bg: #eef1f6; --card: #fff; --line: #e6eaf2; --line-soft: #eef1f7;
      --ink: #17233c; --ink-2: #566079; --ink-3: #93a0b8;
      --brand: #1a66ff; --brand-soft: #eef4ff; --brand-line: #cfe0ff;
      --buy: #0f9960; --buy-soft: #eafaf2; --buy-line: #b7e6cd;
      --tp: #1a66ff; --tp-soft: #eef4ff; --tp-line: #cfe0ff;
      --sl: #e0403f; --sl-soft: #fdeeee; --sl-line: #f5c6c5;
      --warn: #b7791f; --warn-soft: #fdf6e7; --warn-line: #f0dca6;
      --shadow: 0 1px 2px rgba(23,35,60,.05), 0 10px 30px rgba(23,35,60,.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1120; --card: #151d2e; --line: #26324a; --line-soft: #1e2942;
        --ink: #e7ecf5; --ink-2: #a3b0c8; --ink-3: #6b7a96;
        --brand: #5b93ff; --brand-soft: #16233f; --brand-line: #2b426f;
        --buy: #34c98a; --buy-soft: #102a1f; --buy-line: #1c4d38;
        --tp: #5b93ff; --tp-soft: #16233f; --tp-line: #2b426f;
        --sl: #ff7a7d; --sl-soft: #2c1719; --sl-line: #5a2b2e;
        --warn: #e3b341; --warn-soft: #2a2211; --warn-line: #574714;
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 12px 34px rgba(0,0,0,.35);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      font-variant-numeric: tabular-nums; -webkit-font-smoothing: antialiased;
    }
    .page { max-width: 860px; margin: 28px auto; padding: 0 16px 40px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }

    /* ---- Hero ---- */
    .hero { background: linear-gradient(135deg,#1f2937,#0f172a); color: #fff; padding: 18px 22px 20px; }
    .hero-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .badge-brand { font-size: 12.5px; font-weight: 700; letter-spacing: .04em; opacity: .92; }
    .hero-time { font-size: 12px; color: #9fb0cf; }
    .hero-q { margin-top: 12px; font-size: 18px; font-weight: 700; line-height: 1.45; }
    .hero-q .lbl { color: #7f95ff; margin-right: 6px; }

    /* ---- 决策速览 ---- */
    .decision { margin-top: 16px; }
    .dc { padding: 4px 2px; }
    .dc-hd { display: flex; align-items: center; justify-content: space-between; padding: 2px 4px 12px; }
    .dc-title { font-size: 14px; font-weight: 800; letter-spacing: .02em; }
    .dc-period { font-size: 12px; font-weight: 600; color: var(--brand); background: var(--brand-soft); border: 1px solid var(--brand-line); padding: 3px 11px; border-radius: 99px; }

    .dc-stock {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 13px 15px; border-radius: 13px; margin-bottom: 12px;
      background: linear-gradient(120deg, var(--buy-soft), transparent 70%);
      border: 1px solid var(--line);
    }
    .dc-stock-l { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .dc-stock-tag { font-size: 11px; font-weight: 700; color: #fff; background: var(--buy); padding: 3px 9px; border-radius: 7px; letter-spacing: .05em; }
    .dc-stock-name { font-size: 22px; font-weight: 800; letter-spacing: .01em; }
    .dc-stock-code { font-size: 14px; color: var(--ink-3); font-weight: 600; }
    .dc-quote { font-size: 12.5px; font-weight: 700; color: var(--brand); text-decoration: none; white-space: nowrap; padding: 7px 13px; border: 1px solid var(--brand-line); border-radius: 9px; background: var(--brand-soft); }
    .dc-quote:hover { filter: brightness(1.05); }

    .dc-tiles { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }
    @media (max-width: 560px) { .dc-tiles { grid-template-columns: 1fr; } }
    .tile { border-radius: 12px; padding: 12px 13px; border: 1px solid var(--line); position: relative; }
    .tile::before { content: ""; position: absolute; left: 0; top: 12px; bottom: 12px; width: 3px; border-radius: 3px; }
    .tile .tile-k { font-size: 12px; font-weight: 700; margin-bottom: 5px; letter-spacing: .03em; }
    .tile .tile-v { font-size: 13px; line-height: 1.5; color: var(--ink); }
    .tile.buy { background: var(--buy-soft); border-color: var(--buy-line); } .tile.buy::before { background: var(--buy); } .tile.buy .tile-k { color: var(--buy); }
    .tile.tp  { background: var(--tp-soft);  border-color: var(--tp-line); }  .tile.tp::before  { background: var(--tp); }  .tile.tp .tile-k { color: var(--tp); }
    .tile.sl  { background: var(--sl-soft);  border-color: var(--sl-line); }  .tile.sl::before  { background: var(--sl); }  .tile.sl .tile-k { color: var(--sl); }
    .tile .tile-k { padding-left: 10px; } .tile .tile-v { padding-left: 10px; }

    .dc-rows { display: flex; flex-direction: column; gap: 8px; }
    .dc-row { display: flex; gap: 10px; padding: 10px 13px; border-radius: 11px; background: var(--line-soft); border-left: 3px solid var(--ink-3); }
    .dc-row.logic { border-left-color: var(--buy); }
    .dc-row.risk { border-left-color: var(--warn); background: var(--warn-soft); }
    .dc-row-k { font-size: 12.5px; font-weight: 700; color: var(--ink-2); flex-shrink: 0; width: 46px; }
    .dc-row.risk .dc-row-k { color: var(--warn); }
    .dc-row-v { font-size: 13px; line-height: 1.55; color: var(--ink); flex: 1; }

    /* ---- 正文 ---- */
    .body-wrap { margin-top: 16px; }
    .body-hd { font-size: 12.5px; font-weight: 700; color: var(--ink-3); letter-spacing: .06em; padding: 0 4px 8px; }
    .ans { padding: 20px 22px; font-size: 14.5px; line-height: 1.85; }
    .ans h1,.ans h2,.ans h3,.ans h4 { margin: 20px 0 8px; color: var(--ink); line-height: 1.4; }
    .ans h1 { font-size: 18px; } .ans h2 { font-size: 16.5px; } .ans h3,.ans h4 { font-size: 15px; }
    .ans h2, .ans h3 { padding-left: 10px; border-left: 3px solid var(--brand); }
    .ans p { margin: 9px 0; } .ans p.num { margin: 12px 0 4px; font-weight: 600; }
    .ans ul { padding-left: 22px; margin: 6px 0; } .ans li { margin: 4px 0; }
    .ans strong { color: var(--ink); font-weight: 700; }
    .ans code { background: var(--line-soft); padding: 1px 6px; border-radius: 5px; font-size: 13px; }
    .ans hr { border: none; border-top: 1px solid var(--line); margin: 16px 0; }
    .ans a { color: var(--brand); }

    /* ---- markdown 表格 ---- */
    .md-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13.5px; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
    .md-table th { background: var(--brand-soft); color: var(--ink); font-weight: 700; text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--line); font-size: 12.5px; letter-spacing: .02em; }
    .md-table td { padding: 9px 12px; border-bottom: 1px solid var(--line-soft); vertical-align: top; line-height: 1.55; }
    .md-table tr:last-child td { border-bottom: none; }
    .md-table tbody tr:nth-child(even) { background: color-mix(in srgb, var(--line-soft) 45%, transparent); }
    .md-table td:first-child { font-weight: 700; color: var(--ink-2); white-space: nowrap; }

    /* ---- 个股 ---- */
    .stocks { padding: 14px 22px; border-top: 1px solid var(--line); background: var(--line-soft); font-size: 13px; color: var(--ink-2); }
    .chip { display: inline-block; padding: 4px 12px; margin: 3px 6px 3px 0; border-radius: 8px; font-size: 13px; background: var(--card); color: var(--ink-2); border: 1px solid var(--line); }
    .chip.hot { background: var(--buy-soft); color: var(--buy); border-color: var(--buy-line); font-weight: 700; }
    .chip[data-code] { cursor: pointer; } .chip[data-code]:hover { filter: brightness(.98); }

    .disclaimer { text-align: center; margin-top: 16px; font-size: 12px; color: var(--ink-3); }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <header class="hero">
        <div class="hero-top"><span class="badge-brand">💡 问财观点参考</span><span class="hero-time" id="sub"></span></div>
        <div class="hero-q" id="q"></div>
      </header>
    </div>

    <div id="decision" class="decision"></div>

    <div class="body-wrap">
      <div class="body-hd">完整分析</div>
      <div class="card"><div class="ans" id="ans"></div><div class="stocks" id="stocks"></div></div>
    </div>

    <div class="disclaimer">⚠️ 这是 LLM 投顾观点，非回测背书的买卖信号，仅供参考</div>
  </div>
  <script src="common.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
