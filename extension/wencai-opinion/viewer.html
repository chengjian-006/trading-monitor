<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>问财观点</title>
  <style>
    :root {
      --bg: #eaeef6; --card: #ffffff; --line: #e6eaf4; --line-soft: #eff2f9;
      --ink: #131b2b; --ink-2: #40495c; --ink-3: #8791a6;
      --brand: #3d4ee0; --brand-soft: #eef1fb; --brand-line: #d9e0f7;
      --rise: #d3453b; --rise-soft: #fdeceb; --fall: #12894e; --fall-soft: #e7f7ee;
      --shadow: 0 1px 2px rgba(40,60,110,.05), 0 22px 48px -26px rgba(40,60,110,.35);
      --sans: -apple-system,BlinkMacSystemFont,"Segoe UI Variable","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0f16; --card: #161b26; --line: #242b3a; --line-soft: #1c2230;
        --ink: #eef1f7; --ink-2: #aab4c6; --ink-3: #6b7688;
        --brand: #7d8bff; --brand-soft: #1a2340; --brand-line: #2a3560;
        --rise: #ff6b61; --rise-soft: #2a1917; --fall: #3fb97e; --fall-soft: #12281d;
        --shadow: 0 1px 2px rgba(0,0,0,.4), 0 24px 52px -24px rgba(0,0,0,.7);
      }
    }
    :root[data-theme="light"] {
      --bg: #eaeef6; --card: #fff; --line: #e6eaf4; --line-soft: #eff2f9;
      --ink: #131b2b; --ink-2: #40495c; --ink-3: #8791a6;
      --brand: #3d4ee0; --brand-soft: #eef1fb; --brand-line: #d9e0f7;
      --rise: #d3453b; --rise-soft: #fdeceb; --fall: #12894e; --fall-soft: #e7f7ee;
      --shadow: 0 1px 2px rgba(40,60,110,.05), 0 22px 48px -26px rgba(40,60,110,.35);
    }
    :root[data-theme="dark"] {
      --bg: #0c0f16; --card: #161b26; --line: #242b3a; --line-soft: #1c2230;
      --ink: #eef1f7; --ink-2: #aab4c6; --ink-3: #6b7688;
      --brand: #7d8bff; --brand-soft: #1a2340; --brand-line: #2a3560;
      --rise: #ff6b61; --rise-soft: #2a1917; --fall: #3fb97e; --fall-soft: #12281d;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 24px 52px -24px rgba(0,0,0,.7);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans);
      font-variant-numeric: tabular-nums; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .page { max-width: 760px; margin: 0 auto; padding: 30px 18px 48px; display: flex; flex-direction: column; gap: 14px; }

    .masthead { display: flex; align-items: center; justify-content: space-between; padding: 2px 4px; }
    .mh-brand { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 800; letter-spacing: .04em; color: var(--brand); text-transform: uppercase; }
    .mh-brand .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
    .mh-date { font-size: 12px; color: var(--ink-3); }
    .quote { font-size: 16px; font-weight: 700; line-height: 1.5; color: var(--ink); padding: 2px 4px 4px; letter-spacing: -.005em; }
    .quote .qm { color: var(--brand); }

    .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); }

    /* 决策卡 */
    .decision { padding: 20px 22px 22px; }
    .d-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .d-eye { font-size: 10.5px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }
    .d-name { font-size: 27px; font-weight: 800; letter-spacing: -.02em; margin-top: 7px; }
    .d-name .d-code { font-size: 15px; font-weight: 600; color: var(--ink-3); margin-left: 9px; letter-spacing: 0; }
    .d-tags { margin-top: 9px; font-size: 12px; color: var(--ink-2); }
    .pill { display: inline-block; font-size: 11px; font-weight: 800; padding: 2px 9px; border-radius: 99px; background: var(--brand-soft); color: var(--brand); margin-right: 7px; }
    .d-quote { flex-shrink: 0; font-size: 12.5px; font-weight: 700; color: #fff; background: var(--brand); text-decoration: none; padding: 8px 15px; border-radius: 10px; white-space: nowrap; }
    .d-quote:hover { filter: brightness(1.06); }

    .d-cur { margin-top: 15px; font-size: 12.5px; color: var(--ink-3); display: flex; align-items: baseline; gap: 8px; }
    .d-cur b { font-size: 18px; font-weight: 800; color: var(--ink); }
    .d-cur .chg { font-size: 12px; font-weight: 800; }
    .chg.up, .t-d.up { color: var(--rise); } .chg.down, .t-d.down { color: var(--fall); }

    .tiles { display: grid; grid-template-columns: repeat(3,1fr); gap: 11px; margin: 15px 0 4px; }
    @media (max-width: 540px) { .tiles { grid-template-columns: 1fr; } }
    .tile { background: var(--line-soft); border: 1px solid var(--line); border-radius: 14px; padding: 13px 14px; }
    .t-k { font-size: 10.5px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-3); }
    .t-k span { color: var(--ink-3); opacity: .7; margin-left: 5px; font-size: 9.5px; }
    .t-num { font-size: 25px; font-weight: 800; color: var(--ink); margin: 8px 0 0; line-height: 1; letter-spacing: -.02em; display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .t-d { font-size: 12px; font-weight: 800; }
    .t-bar { height: 5px; border-radius: 99px; margin: 11px 0 0; background: var(--line); overflow: hidden; }
    .t-bar i { display: block; height: 100%; border-radius: 99px; }
    .tile.buy .t-bar i { background: var(--fall); } .tile.tp .t-bar i { background: var(--brand); } .tile.sl .t-bar i { background: var(--rise); }
    .t-cap { font-size: 11.5px; color: var(--ink-2); line-height: 1.55; margin-top: 11px; }
    .t-only { font-size: 13px; color: var(--ink); line-height: 1.55; margin-top: 8px; font-weight: 600; }

    .thesis { display: flex; flex-direction: column; gap: 9px; margin-top: 16px; }
    .th { display: flex; gap: 11px; padding: 11px 13px; border-radius: 12px; background: var(--line-soft); }
    .th.risk { background: var(--rise-soft); }
    .th-k { flex-shrink: 0; font-size: 12px; font-weight: 800; width: 34px; color: var(--fall); }
    .th.risk .th-k { color: var(--rise); }
    .th-v { font-size: 13px; line-height: 1.6; color: var(--ink); }

    /* 完整分析 */
    .analysis { padding: 18px 22px 20px; }
    .a-hd { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; }
    .ans { font-size: 14.5px; line-height: 1.85; color: var(--ink); }
    .ans h1,.ans h2,.ans h3,.ans h4 { margin: 18px 0 8px; line-height: 1.4; font-weight: 800; }
    .ans h1 { font-size: 17px; } .ans h2 { font-size: 16px; } .ans h3,.ans h4 { font-size: 14.5px; }
    .ans p { margin: 9px 0; } .ans p.num { font-weight: 700; margin: 12px 0 4px; }
    .ans ul { padding-left: 20px; margin: 6px 0; } .ans li { margin: 4px 0; }
    .ans strong { font-weight: 800; } .ans code { background: var(--line-soft); padding: 1px 6px; border-radius: 5px; font-size: 13px; }
    .ans hr { border: 0; border-top: 1px solid var(--line); margin: 14px 0; }
    .ans sup { color: var(--ink-3); font-size: 11px; }
    .md-table { width: 100%; border-collapse: collapse; margin: 13px 0; font-size: 13.5px; }
    .md-table th { text-align: left; font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); padding: 0 14px 9px 0; border-bottom: 2px solid var(--line); }
    .md-table td { padding: 11px 14px 11px 0; border-bottom: 1px solid var(--line-soft); vertical-align: top; line-height: 1.6; }
    .md-table tr:last-child td { border-bottom: 0; }
    .md-table td:first-child { font-weight: 800; color: var(--brand); white-space: nowrap; padding-right: 22px; }

    .stocks { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); font-size: 12.5px; color: var(--ink-3); }
    .chip { display: inline-block; padding: 4px 11px; margin: 3px 6px 3px 0; border-radius: 9px; font-size: 12.5px; background: var(--line-soft); color: var(--ink-2); border: 1px solid var(--line); }
    .chip.hot { background: var(--brand-soft); color: var(--brand); border-color: var(--brand-line); font-weight: 700; }
    .chip[data-code] { cursor: pointer; }

    .foot { text-align: center; font-size: 11.5px; color: var(--ink-3); padding: 6px 0 0; letter-spacing: .02em; }
  </style>
</head>
<body>
  <div class="page">
    <div class="masthead">
      <div class="mh-brand"><span class="dot"></span>问财观点 · 研判速览</div>
      <div class="mh-date" id="sub"></div>
    </div>
    <div class="quote" id="q"></div>

    <div class="card decision" id="decision"></div>

    <div class="card analysis">
      <div class="a-hd">完整分析</div>
      <div class="ans" id="ans"></div>
      <div class="stocks" id="stocks"></div>
    </div>

    <div class="foot">LLM 投顾观点 · 非回测背书信号 · 仅供参考</div>
  </div>
  <script src="common.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
