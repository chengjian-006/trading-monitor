<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>问财观点</title>
  <style>
    body { margin: 0; background: #f3f4f6; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color: #1f2937; }
    .page { max-width: 820px; margin: 28px auto; background: #fff; border-radius: 16px; box-shadow: 0 6px 24px rgba(0,0,0,.08); overflow: hidden; }
    .hd { background: linear-gradient(135deg,#1f2937,#111827); color: #fff; padding: 16px 24px; font-weight: 600; }
    .q { padding: 14px 24px; background: #f8fafc; border-bottom: 1px solid #eef2f7; color: #334155; font-weight: 600; }
    .sub { padding: 4px 24px 0; color: #94a3b8; font-size: 12px; }
    .ans { padding: 18px 24px; font-size: 15px; line-height: 1.85; }
    .ans h1,.ans h2,.ans h3,.ans h4 { margin: 18px 0 8px; color: #0f172a; } .ans h2 { font-size: 17px; }
    .ans p { margin: 8px 0; } .ans p.num { margin: 12px 0 4px; color: #0f172a; } .ans ul { padding-left: 22px; } .ans li { margin: 4px 0; }
    .ans strong { color: #0f172a; } .ans code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; }
    .stocks { padding: 14px 24px; border-top: 1px solid #eef2f7; background: #fafbfc; }
    .chip { display: inline-block; padding: 4px 12px; margin: 3px 6px 3px 0; border-radius: 8px; font-size: 13px; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .chip.hot { background: #dcfce7; color: #15803d; border-color: #86efac; font-weight: 600; }
    @media (prefers-color-scheme: dark) { body { background:#0f172a; color:#e2e8f0; } .page { background:#1e293b; } .q { background:#172033; color:#cbd5e1; border-color:#334155; } .ans h1,.ans h2,.ans h3,.ans h4,.ans strong { color:#f1f5f9; } .ans code { background:#334155; } .stocks { background:#172033; border-color:#334155; } .chip { background:#334155; color:#cbd5e1; border-color:#475569; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="hd">💡 问财观点参考</div>
    <div class="q" id="q"></div>
    <div class="sub" id="sub"></div>
    <div class="ans" id="ans"></div>
    <div class="stocks" id="stocks"></div>
  </div>
  <script src="common.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
