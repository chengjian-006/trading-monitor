<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <style>
    /* ===== 定时自动问 · 时间点/问题选择器 =====
       只放在 popup.html / options.html 两处内联, 与 popup.css 变量同一套配色 */
    .sched-quick { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .sched-quick label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 9px; border: 1px solid var(--line); border-radius: 8px;
      background: var(--card); font-size: 12px; cursor: pointer; user-select: none;
    }
    .sched-quick label.on { border-color: var(--brand-line); background: var(--brand-soft); color: var(--brand); font-weight: 700; }
    .sched-quick input { margin: 0; }
    .sched-quick .q-lbl { color: var(--ink-3); font-weight: 400; }
    .sched-quick label.on .q-lbl { color: var(--brand); }
    .sched-add { display: flex; gap: 6px; align-items: center; }
    .sched-add input[type=time] {
      flex: 1; min-width: 0; padding: 6px 8px; border: 1px solid var(--line);
      border-radius: 8px; background: var(--card); color: var(--ink);
      font-size: 12px; font-family: inherit;
    }
    .sched-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .sched-tags .ttag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 6px 3px 9px; border-radius: 999px;
      background: var(--brand-soft); border: 1px solid var(--brand-line);
      color: var(--brand); font-size: 12px; font-weight: 700;
    }
    .sched-tags .ttag button {
      border: 0; background: transparent; color: inherit; cursor: pointer;
      font-size: 13px; line-height: 1; padding: 0 2px; opacity: .6;
    }
    .sched-tags .ttag button:hover { opacity: 1; }
    .sched-tags .empty, .sched-qlist .empty { color: var(--ink-3); font-size: 12px; padding: 2px 0; }
    .sched-qlist { display: flex; flex-direction: column; gap: 5px; }
    .sched-qlist label {
      display: flex; align-items: flex-start; gap: 7px; padding: 6px 8px;
      border: 1px solid var(--line); border-radius: 8px; background: var(--card);
      font-size: 12px; line-height: 1.45; cursor: pointer;
    }
    .sched-qlist label.on { border-color: var(--brand-line); background: var(--brand-soft); }
    .sched-qlist input { margin: 2px 0 0; flex-shrink: 0; }
    .sched-qlist .orphan {
      display: flex; align-items: center; gap: 7px; padding: 6px 8px;
      border: 1px solid var(--warn); border-radius: 8px; background: var(--warn-soft);
      font-size: 12px; line-height: 1.45;
    }
    .sched-qlist .orphan .o-txt { flex: 1; color: var(--ink-2); }
    .sched-qlist .orphan .o-tip { display: block; color: var(--warn); font-size: 11px; margin-top: 2px; }
    .sched-qlist .orphan button {
      border: 0; background: transparent; color: var(--warn);
      cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px;
    }
    .sched-note { font-size: 11px; color: var(--warn); margin-top: 9px; line-height: 1.5; }
    .sched-lastrun {
      margin-top: 9px; padding: 7px 9px; border-radius: 8px;
      background: var(--line-soft); color: var(--ink-2); font-size: 12px;
    }
    .sched-lastrun.bad { background: var(--err-soft); color: var(--err); }
  </style>
</head>
<body>
<div class="app">

  <!-- ===== 顶部：品牌 + 额度 ===== -->
  <header class="hd">
    <div class="brand">
      <div class="logo">💡</div>
      <div class="brand-txt">
        <div class="brand-name">问财观点</div>
        <div class="brand-sub">口语问一句 · 存进股小察</div>
      </div>
    </div>
    <div id="quota" class="quota"><span class="qpill ghost">额度加载中…</span></div>
  </header>

  <!-- ===== 新版提醒横幅 ===== -->
  <a id="updateBar" class="update-bar hide" href="#" target="_blank">
    <span class="ub-ic">⬆</span>
    <span class="ub-txt">发现新版 <b id="ubVer"></b>，点此下载更新</span>
    <span class="ub-go">下载 →</span>
  </a>

  <!-- ===== 主体：三个面板 ===== -->
  <main class="panels">

    <!-- 问答 -->
    <section class="panel active" id="panel-ask">

      <div id="loginTip" class="login-tip hide">
        <div class="lt-l"><span class="lt-ic">🔑</span><span class="lt-txt">未登录问财，登录后才能提问</span></div>
        <button id="ltGo" class="btn primary">登录问财</button>
      </div>

      <!-- 一次都没问过时才出现: 新用户打开弹窗先看到的是几个不知道点了会怎样的按钮, 给条回引导页的路 -->
      <div id="firstRunTip" class="first-run-tip hide">
        <div class="lt-l"><span class="lt-ic">💡</span><span class="lt-txt">第一次用？三步上手引导，一分钟看完</span></div>
        <button id="frGo" class="btn ghost">看引导</button>
      </div>

      <div class="sec-label">快捷提问 <span class="sec-hint">后台跑，不用开问财页</span></div>
      <div id="askBtns" class="preset-list"></div>

      <div class="ask-box">
        <textarea id="askInput" rows="2" placeholder="或输入自定义问题…"></textarea>
        <div class="ask-tools">
          <label class="deep-toggle" title="深度研究更深入，但每天约10次额度；普通模式约188次">
            <input id="deepResearch" type="checkbox">
            <span class="sw"></span>
            <span class="deep-txt">深度研究</span>
          </label>
          <button id="askGo" class="send-btn" title="提问">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3.4 20.4l17.4-7.5c.8-.35.8-1.45 0-1.8L3.4 3.6c-.66-.29-1.39.2-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/></svg>
          </button>
        </div>
      </div>

      <div id="runCard" class="run-card hide">
        <div class="run-head">
          <span class="spinner"></span>
          <span class="run-title">问财思考中…</span>
          <span id="runElapsed" class="run-elapsed"></span>
        </div>
        <div id="runQ" class="run-q"></div>
        <div class="run-tip">可以关掉这个窗口，完成后会弹系统通知</div>
      </div>

      <div id="resultCard" class="result-card hide"></div>
    </section>

    <!-- 历史 -->
    <section class="panel" id="panel-history">
      <div class="sec-label">最近问答 <span class="sec-hint">点击查看全文</span></div>
      <div id="history" class="history-list"></div>
    </section>

    <!-- 设置 -->
    <section class="panel" id="panel-settings">

      <button id="openOptions" class="options-entry">
        <span class="oe-ic">⚙</span>
        <span class="oe-txt">打开完整设置页<small>宽屏编辑预置问题 / 定时 / 存档规则</small></span>
        <span class="oe-go">→</span>
      </button>

      <button id="openWelcome" class="options-entry">
        <span class="oe-ic">💡</span>
        <span class="oe-txt">重看上手引导<small>三步清单 / 完成情况会自动打勾</small></span>
        <span class="oe-go">→</span>
      </button>

      <div class="card">
        <div class="card-title">账号</div>
        <label class="sw-row" style="cursor:default">
          <span class="sw-txt">问财登录状态<small id="loginStatus">检测中…</small></span>
          <button id="reLogin" class="btn ghost">重新登录</button>
        </label>
      </div>

      <div class="card">
        <div class="card-title">存进股小察</div>
        <div class="field">
          <label for="uploader">我的昵称</label>
          <input id="uploader" type="text" placeholder="选填，如：老王（留空自动用同花顺账号）">
        </div>
        <label class="sw-row">
          <span class="sw-txt">问完自动存档<small>关掉 = 只看答案，要存再手动点</small></span>
          <span class="sw-wrap"><input id="autoUpload" type="checkbox"><span class="sw"></span></span>
        </label>
        <label class="sw-row">
          <span class="sw-txt">没识别出个股就不存<small>过滤纯观点类回答</small></span>
          <span class="sw-wrap"><input id="onlyWithStock" type="checkbox"><span class="sw"></span></span>
        </label>
      </div>

      <div class="card">
        <div class="card-title">预置问题</div>
        <div class="field">
          <textarea id="presets" rows="4" placeholder="每行一条口语问题"></textarea>
          <div class="field-hint">显示在问答页和问财页悬浮菜单里，每行一条</div>
        </div>
      </div>

      <div class="card">
        <label class="sw-row">
          <span class="sw-txt">定时自动问<small>⚠️ 自动化封号风险相对高，谨慎开</small></span>
          <span class="sw-wrap"><input id="schedEnabled" type="checkbox"><span class="sw"></span></span>
        </label>
        <div id="schedBody" class="sched-body">
          <div class="field">
            <label>时间点</label>
            <!-- 常用时间点直接勾, 自定义走 input[type=time]: 原生就产出零填充 HH:MM,
                 从根上避免手敲出 "9:35"/中文逗号这类后台永远匹配不上的值 -->
            <div id="schedQuick" class="sched-quick"></div>
            <div class="sched-add">
              <input id="schedCustomTime" type="time" step="60" aria-label="自定义时间点">
              <button id="schedAddTime" class="btn ghost" type="button">添加</button>
            </div>
            <div id="schedTimeTags" class="sched-tags"></div>
          </div>
          <div class="field">
            <label>定时跑哪些问题</label>
            <!-- 从预置问题里勾选, 不再让用户把问题重抄一遍(抄完两边就不同步了) -->
            <div id="schedQList" class="sched-qlist"></div>
            <div id="schedQHint" class="field-hint"></div>
          </div>
          <div class="sched-note">浏览器必须保持开着才会执行（关机/退出浏览器期间不会跑）。</div>
          <div id="schedLastRun" class="sched-lastrun">上次运行：还没跑过</div>
        </div>
      </div>

      <div class="ver-row">
        <span class="ver-txt">版本 <b id="verNow"></b></span>
        <button id="checkUpdate" class="btn ghost">检查更新</button>
      </div>

    </section>
  </main>

  <!-- ===== 底部 Tab ===== -->
  <nav class="tabbar">
    <button class="tab active" data-panel="panel-ask">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 3C6.5 3 2 6.9 2 11.7c0 2.7 1.4 5.1 3.6 6.7-.14 1.2-.62 2.3-1.43 3.2-.2.23 0 .6.3.55 1.9-.3 3.5-1.06 4.7-1.9 1 .25 1.9.38 2.9.38 5.5 0 10-3.9 10-8.7S17.5 3 12 3z"/></svg>
      <span>问答</span>
    </button>
    <button class="tab" data-panel="panel-history">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M13 3a9 9 0 0 0-9 9H1.8c-.45 0-.67.54-.35.85l3.3 3.3c.2.2.5.2.7 0l3.3-3.3c.32-.31.1-.85-.35-.85H6a7 7 0 1 1 7 7 6.96 6.96 0 0 1-4.9-2 .5.5 0 0 0-.7 0l-.72.7c-.2.2-.2.53 0 .72A9 9 0 1 0 13 3zm-.5 5v4.2c0 .27.1.52.3.7l2.9 2.9c.3.3.77.3 1.06 0 .3-.3.3-.77 0-1.06L14 12V8c0-.41-.34-.75-.75-.75S12.5 7.59 12.5 8z"/></svg>
      <span>历史</span>
    </button>
    <button class="tab" data-panel="panel-settings">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19.4 13c.04-.33.07-.66.07-1s-.03-.67-.07-1l2.1-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.5 1a7.3 7.3 0 0 0-1.7-1l-.4-2.65A.5.5 0 0 0 13.9 2h-4a.5.5 0 0 0-.5.42l-.4 2.65c-.6.26-1.17.6-1.69 1l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64L4.4 11c-.04.33-.07.66-.07 1s.03.67.07 1l-2.1 1.65a.5.5 0 0 0-.12.64l2 3.46c.14.24.42.33.6.22l2.5-1c.52.4 1.08.74 1.69 1l.4 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.4-2.65c.6-.26 1.17-.6 1.69-1l2.49 1c.23.09.5 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64L19.4 13zm-7.5 2.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"/></svg>
      <span>设置</span>
    </button>
  </nav>

  <div id="toast" class="toast"></div>
</div>
<script src="common.js"></script>
<script src="popup.js"></script>
</body>
</html>
