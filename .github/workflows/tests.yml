name: Tests

# 后端 pytest + 前端 build 门禁: 每次 push/PR 到 main 自动跑, 在源头拦下坏代码。
# 设立动机: 2026-07-24 一次 repository.py 误带 import 直接进 main 致生产 502 —— 后端级
# 错误此前无 CI 拦截(deploy.ps1 只 build 前端), 本 workflow 补上这道闸。
# action 版本 pin 到 commit SHA(与 security.yml 同规), 防 tag 被重打导致供应链风险。

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'   # 对齐 security.yml, 也更接近生产 ubuntu
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install pinned dependencies
        run: python -m pip install -r requirements.txt
      - name: Run backend tests
        # 整套不连库不联网(自带假桩), 无需 config.json(load_config 回落 DEFAULT_CONFIG);
        # test_bt_follow 依赖 gitignore 的本地回测脚本, 已用 importorskip 在此环境自动跳过。
        run: python -m pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked frontend dependencies
        run: npm ci
      - name: Type-check and build
        run: npm run build   # vue-tsc 类型检查 + vite 构建, 任一失败即门禁不过
